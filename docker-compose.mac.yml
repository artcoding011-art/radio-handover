version: '3.8'

services:
  # Redis Database
  redis:
    image: redis:7-alpine
    container_name: radio-handover-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # OpenClaw Agent
  openclaw:
    image: node:22-alpine
    container_name: openclaw-agent
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
    command: sh -c "npx -y openclaw@latest start"
    depends_on:
      - redis
    restart: always

volumes:
  redis_data:
