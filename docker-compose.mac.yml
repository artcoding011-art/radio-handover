version: '3.8'

services:
  # Redis Database
  redis:
    image: redis:7-alpine
    container_name: radio-handover-redis
    command: redis-server --timeout 0 --tcp-keepalive 60
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # OpenClaw Agent
  openclaw:
    image: node:22-alpine
    container_name: openclaw-agent
    working_dir: /app
    volumes:
      - .:/app
      - /Users/admin/.openclaw:/root/.openclaw
    environment:
      - NODE_ENV=production
      - GOOGLE_API_KEY=AIzaSyDY4GcRoXmb9RaR__MFE2-apFdRJGQonTk
    command: sh -c "npx -y openclaw@latest start --logs-stdout"
    depends_on:
      - redis
    restart: always

volumes:
  redis_data:
