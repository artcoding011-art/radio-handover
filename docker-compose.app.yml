version: '3.8'

services:
  # Redis Database
  redis:
    image: redis:7-alpine
    container_name: radio-handover-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radio-handover-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - KV_URL=redis://redis:6379
      - JWT_SECRET=your-secret-key-here-change-this
      - ADMIN_ID=admin
      - ADMIN_PASSWORD=admin
    depends_on:
      - redis
    restart: always

volumes:
  redis_data:
